<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content Quest — Jun 30 to Jul 4</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#1a1c2c;--panel:#29366f;--panel-light:#3b5dc9;--ink:#f4f4f4;
    --ink-dim:#a7b4e0;--gold:#ffcd75;--green:#38b764;--pink:#ef7d57;
    --shadow:#10121e;--grid:#222640;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'VT323',monospace;background:var(--bg);
    background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
    background-size:32px 32px;color:var(--ink);min-height:100vh;
    padding:24px 12px 64px;font-size:22px;line-height:1.3;image-rendering:pixelated;
  }
  .wrap{max-width:920px;margin:0 auto}
  header{text-align:center;margin-bottom:28px}
  h1{font-family:'Press Start 2P',monospace;font-size:clamp(14px,3.4vw,26px);color:var(--gold);line-height:1.5;text-shadow:3px 3px 0 var(--shadow);margin-bottom:14px}
  .subtitle{color:var(--ink-dim);font-size:24px}
  .status{font-family:'Press Start 2P';font-size:8px;margin-top:10px;color:var(--ink-dim)}
  .status.live{color:var(--green)}
  .status.err{color:var(--pink)}
  .who{display:flex;justify-content:center;gap:10px;margin:18px 0 6px;flex-wrap:wrap}
  .who span{font-family:'Press Start 2P';font-size:9px;color:var(--ink-dim);align-self:center}
  .who button{font-family:'Press Start 2P',monospace;font-size:10px;cursor:pointer;color:var(--ink);background:var(--panel);border:3px solid var(--shadow);box-shadow:4px 4px 0 var(--shadow);padding:10px 14px;transition:transform .05s}
  .who button:hover{transform:translate(1px,1px)}
  .who button[aria-pressed="true"]{background:var(--gold);color:var(--shadow)}
  .progress-wrap{margin:18px 0 30px}
  .progress-label{font-family:'Press Start 2P';font-size:9px;color:var(--ink-dim);margin-bottom:8px;display:block}
  .bar{height:26px;border:3px solid var(--shadow);background:var(--shadow);box-shadow:4px 4px 0 var(--shadow);position:relative;overflow:hidden}
  .bar-fill{height:100%;width:0;background:var(--green);transition:width .25s steps(8)}
  .bar-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Press Start 2P';font-size:10px;color:var(--ink);text-shadow:1px 1px 0 var(--shadow)}
  .day{border:3px solid var(--shadow);box-shadow:6px 6px 0 var(--shadow);background:var(--panel);margin-bottom:26px}
  .day-head{display:flex;align-items:center;gap:12px;background:var(--panel-light);padding:12px 16px;border-bottom:3px solid var(--shadow)}
  .day-head .badge{font-size:28px}
  .day-head h2{font-family:'Press Start 2P';font-size:12px;color:var(--ink)}
  .day-head .count{margin-left:auto;font-family:'Press Start 2P';font-size:9px;color:var(--gold)}
  table{width:100%;border-collapse:collapse}
  thead th{font-family:'Press Start 2P';font-size:8px;color:var(--ink-dim);text-align:left;padding:10px 12px;border-bottom:2px solid var(--shadow)}
  td{padding:12px;border-bottom:2px solid var(--grid);vertical-align:middle;font-size:21px}
  tr:last-child td{border-bottom:none}
  .task{display:flex;align-items:flex-start;gap:12px}
  .task .icon{font-size:26px;flex-shrink:0;line-height:1}
  .task a{color:var(--gold);text-decoration:none;border-bottom:2px dotted var(--gold)}
  .task a:hover{color:var(--ink)}
  .task.done .label{color:var(--ink-dim);text-decoration:line-through}
  .pixbox{width:30px;height:30px;flex-shrink:0;cursor:pointer;background:var(--bg);border:3px solid var(--shadow);box-shadow:3px 3px 0 var(--shadow);position:relative;display:flex;align-items:center;justify-content:center;transition:transform .05s}
  .pixbox:hover{transform:translate(1px,1px)}
  .pixbox.checked{background:var(--green)}
  .pixbox.checked::after{content:"";width:14px;height:8px;margin-top:-4px;border-left:4px solid var(--shadow);border-bottom:4px solid var(--shadow);transform:rotate(-45deg)}
  .timecell input{font-family:'VT323',monospace;font-size:20px;width:100%;background:var(--bg);color:var(--ink);border:2px solid var(--shadow);padding:6px 8px}
  .timecell input:focus{outline:2px solid var(--gold)}
  .col-check{width:48px;text-align:center}
  .col-time{width:150px}
  footer{text-align:center;color:var(--ink-dim);font-size:20px;margin-top:30px}
  @media(max-width:640px){
    thead{display:none}
    td{display:block;border-bottom:none;padding:8px 12px}
    tr{display:block;border-bottom:2px solid var(--grid);padding:8px 0}
    .col-time::before{content:attr(data-label);font-family:'Press Start 2P';font-size:7px;color:var(--ink-dim);display:block;margin-bottom:4px}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Content Quest</h1>
    <div class="subtitle">June 30 &rarr; July 4 &middot; daily drops</div>
    <div class="status" id="status">connecting...</div>
    <div class="who">
      <span>Playing as:</span>
      <button data-who="shariff" aria-pressed="true">Shariff</button>
      <button data-who="adith" aria-pressed="false">Adith</button>
    </div>
  </header>
  <div class="progress-wrap">
    <span class="progress-label">Quest progress</span>
    <div class="bar"><div class="bar-fill" id="barFill"></div><div class="bar-text" id="barText">0%</div></div>
  </div>
  <div id="board"></div>
  <footer>Ticks and times sync live across every device.</footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://fkoacgbnqszxsryxrach.supabase.co";
const SUPABASE_KEY = "sb_publishable_tQSJokqasvpMLbpdntovxg_97qfsK1W";
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const DATA = [
  {date:"June 30", badge:"\u{1F680}", tasks:[
    {id:"j30a", icon:"\u{1F4F0}", html:'Agents everywhere - Article and its design - (<a href="https://github.com/Bitplanet-L1/external-content/blob/main/Design%20Works/Deva1/deva-post1/deva-post1.md" target="_blank" rel="noopener">link</a>)'},
    {id:"j30b", icon:"\u{2699}\u{FE0F}", html:'Handling everything (Agent Automation and Optimization)'},
    {id:"j30c", icon:"\u{1F34E}", html:'Engagement Video of fruit world'},
  ]},
  {date:"July 1", badge:"\u{1F3AF}", tasks:[
    {id:"j1a", icon:"\u{1F4DD}", html:'Who gets the credit when an agent does the work - Article + visual'},
    {id:"j1b", icon:"\u{1F511}", html:'One key, every tool the agent reaches for - thread'},
    {id:"j1c", icon:"\u{1F4AC}", html:'"Name a task you\'d hand to an agent today" poll/visual'},
  ]},
  {date:"July 2", badge:"\u{1F4B8}", tasks:[
    {id:"j2a", icon:"\u{1F9FE}", html:'Attribution is a settlement problem now, not a marketing one - single post + visual'},
    {id:"j2b", icon:"\u{1F501}", html:"Automatic fallback, or why a dead provider path shouldn't kill the run - thread"},
    {id:"j2c", icon:"\u{1F578}\u{FE0F}", html:'Mascot reaction tied to a current AI trend'},
  ]},
  {date:"July 3", badge:"\u{1F50D}", tasks:[
    {id:"j3a", icon:"\u{1F4C4}", html:'The contribution path nobody logs - short article'},
    {id:"j3b", icon:"\u{1F50C}", html:'Pointing any runtime at one endpoint, walked through - thread + flow diagram'},
    {id:"j3c", icon:"\u{1F916}", html:'"Agent or human?" guess-the-output visual game'},
  ]},
  {date:"July 4", badge:"\u{1F386}", tasks:[
    {id:"j4a", icon:"\u{1F578}\u{FE0F}", html:'One action, hundreds of contributions - thread'},
    {id:"j4b", icon:"\u{1F4CA}", html:'Full-run metering, watching one request move across calls - single post + diagram'},
    {id:"j4c", icon:"\u{1F356}", html:'Weekend "what\'s your agent doing while you grill" lighthearted video/visual'},
  ]},
];

let who = "shariff";
let state = {}; // state[id] = {shariff:bool, adith:bool, time_given, time_done}
const allTasks = DATA.flatMap(d=>d.tasks);

function setStatus(msg, cls){
  const el = document.getElementById("status");
  el.textContent = msg; el.className = "status" + (cls?" "+cls:"");
}

async function loadState(){
  state = {};
  allTasks.forEach(t=>{ state[t.id] = {shariff:false, adith:false, time_given:"", time_done:""}; });
  try{
    const { data, error } = await db.from("tracker").select("*");
    if(error) throw error;
    (data||[]).forEach(row=>{
      const id = row.id.replace(/_shariff$|_adith$/,"");
      const player = row.id.endsWith("_adith") ? "adith" : "shariff";
      if(!state[id]) return;
      if(row.checked) state[id][player] = true;
      if(row.time_given) state[id].time_given = row.time_given;
      if(row.time_done) state[id].time_done = row.time_done;
    });
    setStatus("live - synced", "live");
  }catch(e){
    setStatus("offline - check connection", "err");
    console.error(e);
  }
}

async function saveCheck(id){
  const rowId = id + "_" + who;
  const checked = state[id][who];
  try{
    await db.from("tracker").upsert({ id: rowId, who, checked });
  }catch(e){ setStatus("save failed", "err"); console.error(e); }
}

async function saveTime(id, col, val){
  state[id][col] = val;
  const rowId = id + "_times";
  const payload = { id: rowId, who:"shared" };
  payload[col] = val;
  try{
    await db.from("tracker").upsert(payload);
  }catch(e){ setStatus("save failed", "err"); console.error(e); }
}

function buildBoard(){
  const board = document.getElementById("board");
  board.innerHTML = "";
  DATA.forEach(day=>{
    const sec = document.createElement("section");
    sec.className = "day";
    const rows = day.tasks.map(t=>{
      const s = state[t.id] || {};
      const checked = !!s[who];
      return `<tr data-id="${t.id}">
        <td class="col-check"><div class="pixbox ${checked?"checked":""}" role="checkbox" aria-checked="${checked}" tabindex="0" data-id="${t.id}"></div></td>
        <td><div class="task ${checked?"done":""}"><span class="icon">${t.icon}</span><span class="label">${t.html}</span></div></td>
        <td class="col-time" data-label="Time Shariff gave"><div class="timecell"><input type="text" placeholder="--:--" value="${s.time_given||""}" data-col="time_given" data-id="${t.id}"></div></td>
        <td class="col-time" data-label="Time Adith done"><div class="timecell"><input type="text" placeholder="--:--" value="${s.time_done||""}" data-col="time_done" data-id="${t.id}"></div></td>
      </tr>`;
    }).join("");
    sec.innerHTML = `
      <div class="day-head"><span class="badge">${day.badge}</span><h2>${day.date}</h2><span class="count" data-day-count></span></div>
      <table><thead><tr><th class="col-check">Done</th><th>Post</th><th>Time Shariff gave</th><th>Time Adith done</th></tr></thead>
      <tbody>${rows}</tbody></table>`;
    board.appendChild(sec);
  });
  wireEvents();
  updateProgress();
}

function toggle(id, el){
  state[id][who] = !state[id][who];
  const on = state[id][who];
  el.classList.toggle("checked", on);
  el.setAttribute("aria-checked", on);
  el.closest("tr").querySelector(".task").classList.toggle("done", on);
  updateProgress();
  saveCheck(id);
}

function wireEvents(){
  document.querySelectorAll(".pixbox").forEach(box=>{
    box.addEventListener("click", ()=>toggle(box.dataset.id, box));
    box.addEventListener("keydown", e=>{ if(e.key===" "||e.key==="Enter"){e.preventDefault();toggle(box.dataset.id, box);} });
  });
  document.querySelectorAll(".timecell input").forEach(inp=>{
    let t;
    inp.addEventListener("input", ()=>{
      clearTimeout(t);
      t = setTimeout(()=>saveTime(inp.dataset.id, inp.dataset.col, inp.value), 500);
    });
  });
}

function updateProgress(){
  const done = allTasks.filter(t=>state[t.id] && state[t.id][who]).length;
  const pct = Math.round(done/allTasks.length*100);
  document.getElementById("barFill").style.width = pct+"%";
  document.getElementById("barText").textContent = `${done} / ${allTasks.length} done · ${pct}%`;
  DATA.forEach((d,i)=>{
    const dDone = d.tasks.filter(t=>state[t.id] && state[t.id][who]).length;
    const counts = document.querySelectorAll("[data-day-count]");
    if(counts[i]) counts[i].textContent = `${dDone}/${d.tasks.length}`;
  });
}

document.querySelectorAll(".who button").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    who = btn.dataset.who;
    document.querySelectorAll(".who button").forEach(b=>b.setAttribute("aria-pressed", b.dataset.who===who));
    buildBoard();
  });
});

(async function init(){
  await loadState();
  buildBoard();
  db.channel("tracker-changes")
    .on("postgres_changes", { event:"*", schema:"public", table:"tracker" }, async ()=>{
      await loadState();
      buildBoard();
    })
    .subscribe();
})();
</script>
</body>
</html>
